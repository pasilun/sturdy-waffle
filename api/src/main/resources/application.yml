server:
  port: 8080

spring:
  application:
    name: sturdy-waffle-api
  main:
    banner-mode: off
  flyway:
    enabled: true
  sql:
    init:
      platform: postgresql
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

llm:
  provider: anthropic

logging:
  level:
    root: INFO
    com.sturdywaffle: DEBUG
    org.flywaydb: INFO
