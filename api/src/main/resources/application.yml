server:
  port: 8080

spring:
  application:
    name: sturdy-waffle-api
  main:
    banner-mode: off
  flyway:
    enabled: true
  sql:
    init:
      platform: postgresql
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

llm:
  provider: anthropic   # set LLM_PROVIDER=openai to switch back if billing goes down
  anthropic:
    extractor:
      model: claude-sonnet-4-6
      max-tokens: 1024
    mapper:
      model: claude-haiku-4-5
      max-tokens: 512
    escalation:
      model: claude-sonnet-4-6
      max-tokens: 1024
  openai:
    extractor:
      model: gpt-4o
      max-tokens: 1024
    mapper:
      model: gpt-4o-mini
      max-tokens: 512
    escalation:
      model: gpt-4o
      max-tokens: 1024

logging:
  level:
    root: INFO
    com.sturdywaffle: DEBUG
    org.flywaydb: INFO
